<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de libros</title>
</head>
<body>
    <div>
         <h1>Catálogo</h1>
    </div>

    <div>
        <input type="text" id="filtroAutor" placeholder="Ingrese un autor">
         <button id="filtrar">Filtrar</button>
          <button id="mostrarDisponibles">Solo disponibles</button>
          <button id="mostrarTodos">Ver todos</button>
    </div>

    <div>
         <ul id="listado">
            
         </ul>
    </div>

    <div>
         <p id="stats"></p>
    </div>

     <div class="contenedor-form">
          <h3>Complete los campos para cargar un libro</h3>

          <form>
               <label for="titulo">Titulo:</label>
               <input type="text" id="titulo" name="titulo"
                    placeholder="Titulo" required>

               <label for="autor">Autor:</label>
               <input type="text" id="autor" name="autor"
                    placeholder="Autor" required>

               <label for="precio">Precio:</label>
               <input type="number" id="precio" name="precio"
                    placeholder="Precio" required>

               <label for="disponible">Disponible:</label>
               <input type="checkbox" id="disponible">

               <label for="genero">Genero:</label>
               <input type="text" id="genero" name="genero"
                    placeholder="Genero">
               
                <button type="submit">Enviar</button>
          </form>
          
          <div id="errorForm"></div>

     </div>

     <script src="app.js"></script>
</body>
</html>
